services:
  - type: web
    name: vitalearn-nexus
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        value: "" # Leave empty for demo mode, or add your actual URI here
